<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact – IAO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="section">
    <h1>Contact</h1>
    <p>If you need to reach the Intelligence Anomaly Office (IAO), use the form below.</p>

    <form action="https://formsubmit.co/contact@iaohq.com" method="POST">
        <input type="hidden" name="_subject" value="New Contact Enquiry">
        <input type="hidden" name="_captcha" value="false">

        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Message</label>
        <textarea name="message" rows="5" required></textarea>

        <button type="submit">Send</button>
    </form>
</section>

</body>
</html>
